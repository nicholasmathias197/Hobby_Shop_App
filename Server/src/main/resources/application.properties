# Application Configuration
spring.application.name=hobby-shop-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hobby_shop_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Postgres1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# CHANGED: MySQL8Dialect doesn't exist in Hibernate 7, use MySQLDialect or remove
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# OR comment it out to let Hibernate auto-detect:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Optional: Specify MySQL storage engine
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong!
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB