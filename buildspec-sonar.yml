version: 0.2

env:
  parameter-store:
    SONAR_TOKEN: /sonarcloud/token

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo "Compiling and testing before SonarCloud analysis..."
      - cd Server
      - mvn clean test

  build:
    commands:
      - echo "Running SonarCloud analysis..."
      - mvn sonar:sonar -Dsonar.projectKey=nicholasmathias197_Hobby_Shop_App -Dsonar.organization=nicholasmathias197 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN || true

  post_build:
    commands:
      - echo "SonarCloud analysis complete"
