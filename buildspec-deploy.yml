version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
      nodejs: 20
    commands:
      - echo '========== INSTALLING DEPENDENCIES =========='
      - dnf install -y maven nodejs npm
      - dnf config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - dnf install -y terraform

  pre_build:
    commands:
      - echo '========== BUILDING SPRING BOOT JAR =========='
      - java -version
      - cd Server
      - mvn clean package -DskipTests
      - cd ..
      - echo '========== BUILDING REACT FRONTEND =========='
      - cd Client/hobby-shop-frontend
      - npm install
      - VITE_API_BASE_URL=http://$(aws ec2 describe-instances --instance-ids $(aws ec2 describe-instances --filters "Name=tag:Name,Values=gundam-hobby-shop-backend" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text --region us-east-2) --query "Reservations[0].Instances[0].PublicIpAddress" --output text --region us-east-2):8080/api npm run build
      - cd ../..

  build:
    commands:
      - echo '========== UPLOADING JAR AND SQL TO S3 =========='
      - aws s3 cp Server/target/shop-0.0.1-SNAPSHOT.jar s3://gundam-hobby-shop-frontend-911784620581/app/hobby-shop-backend.jar
      - aws s3 cp Server/src/main/resources/hobbyshop.sql s3://gundam-hobby-shop-frontend-911784620581/app/hobbyshop.sql
      - echo '========== UPLOADING REACT BUILD TO S3 =========='
      - aws s3 sync Client/hobby-shop-frontend/dist s3://gundam-hobby-shop-frontend-911784620581 --delete --exclude "terraform/*" --exclude "app/*" --exclude "tfstate"
      - echo '========== TERRAFORM APPLY =========='
      - terraform init
      - terraform import -input=false aws_security_group.spring_boot_sg sg-090cf228c30fca1dc || true
      - terraform import -input=false aws_iam_role.ec2_role gundam-hobby-shop-ec2-role || true
      - terraform import -input=false aws_iam_instance_profile.ec2_profile gundam-hobby-shop-ec2-profile || true
      - terraform import -input=false aws_iam_role_policy_attachment.ec2_s3 gundam-hobby-shop-ec2-role/arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess || true
      - terraform import -input=false aws_iam_role_policy_attachment.ec2_ssm gundam-hobby-shop-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore || true
      - terraform import -input=false aws_s3_bucket.react_frontend gundam-hobby-shop-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_website_configuration.frontend gundam-hobby-shop-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_public_access_block.frontend gundam-hobby-shop-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_policy.frontend gundam-hobby-shop-frontend-911784620581 || true
      - CURRENT_INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=gundam-hobby-shop-backend" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text --region us-east-2)
      - terraform import -input=false aws_instance.spring_boot_app $CURRENT_INSTANCE_ID || true
      - terraform apply -auto-approve -input=false
      - echo '========== WAITING FOR SSM AND RESTARTING SPRING BOOT =========='
      - chmod +x scripts/ssm-restart.sh
      - bash scripts/ssm-restart.sh || true

  post_build:
    commands:
      - echo '========== DEPLOY COMPLETE =========='
