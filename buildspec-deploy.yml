version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo '========== INSTALLING DEPENDENCIES =========='
      - dnf install -y maven nodejs npm
      - dnf config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - dnf install -y terraform

  pre_build:
    commands:
      - echo '========== BUILDING SPRING BOOT JAR =========='
      - java -version
      - cd Server
      - mvn clean package -DskipTests
      - cd ..
      - echo '========== BUILDING REACT FRONTEND =========='
      - cd Client/hobby-shop-frontend
      - npm install
      - npm run build
      - cd ../..

  build:
    commands:
      - echo '========== UPLOADING JAR TO S3 =========='
      - aws s3 cp Server/target/shop-0.0.1-SNAPSHOT.jar s3://gundam-hobby-shop-frontend-911784620581/app/hobby-shop-backend.jar
      - echo '========== UPLOADING REACT BUILD TO S3 =========='
      - aws s3 sync Client/hobby-shop-frontend/dist s3://gundam-hobby-shop-frontend-911784620581 --delete
      - echo '========== TERRAFORM APPLY =========='
      - terraform init
      - terraform apply -auto-approve -input=false

  post_build:
    commands:
      - echo '========== DEPLOY COMPLETE =========='
